<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ai-card-border {
            position: relative;
        }
        .ai-card-border::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, #4f46e5, #89ceff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#e0e3e5",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed": "#191c1e",
                        "on-tertiary-container": "#b8e0ff",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-container": "#dad7ff",
                        "surface-dim": "#cfdaf2",
                        "outline": "#777587",
                        "tertiary": "#004d70",
                        "surface-container": "#e7eeff",
                        "on-surface-variant": "#464555",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#ecf1ff",
                        "on-primary-fixed": "#0f0069",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#111c2d",
                        "secondary-fixed-dim": "#c4c7c9",
                        "on-secondary": "#ffffff",
                        "surface": "#f9f9ff",
                        "primary": "#3525cd",
                        "tertiary-container": "#006693",
                        "on-background": "#111c2d",
                        "inverse-primary": "#c3c0ff",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#5c5f61",
                        "primary-fixed": "#e2dfff",
                        "surface-container-highest": "#d8e3fb",
                        "tertiary-fixed-dim": "#89ceff",
                        "surface-container-high": "#dee8ff",
                        "secondary-container": "#e0e3e5",
                        "on-error": "#ffffff",
                        "surface-tint": "#4d44e3",
                        "on-tertiary-fixed": "#001e2f",
                        "on-secondary-fixed-variant": "#444749",
                        "on-primary-fixed-variant": "#3323cc",
                        "inverse-surface": "#263143",
                        "tertiary-fixed": "#c9e6ff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "outline-variant": "#c7c4d8",
                        "surface-variant": "#d8e3fb",
                        "background": "#f9f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container_max": "1440px",
                        "sidebar_width": "280px",
                        "margin_desktop": "40px",
                        "base": "8px",
                        "gutter": "24px",
                        "margin_mobile": "16px"
                    },
                    "fontFamily": {
                        "display": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "title-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface flex flex-col">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant flex justify-between items-center h-16 px-margin_mobile z-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<h1 class="font-headline-md text-headline-md text-primary">ScholarTrack AI</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</button>
</header>
<main class="flex-1 px-margin_mobile py-10 flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-10 space-y-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select your role to access your personalized academic dashboard.</p>
</div>
<!-- Role Selection Cards -->
<div class="w-full max-w-md space-y-4">
<!-- Admin Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('admin')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-sm border border-outline-variant hover:border-primary transition-colors ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-2xl bg-primary-container/10 flex items-center justify-center text-primary shrink-0 group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Administrator</h3>
<span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Manage institutional settings, oversee faculty performance, and access high-level analytics.</p>
</div>
</div>
</div>
</button>
<!-- Teacher Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('teacher')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-sm border border-outline-variant hover:border-tertiary transition-colors ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-2xl bg-tertiary-fixed/30 flex items-center justify-center text-tertiary shrink-0 group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="supervisor_account">supervisor_account</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Teacher</h3>
<span class="material-symbols-outlined text-tertiary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Supervise student research, provide feedback on tasks, and track academic milestones.</p>
</div>
</div>
</div>
</button>
<!-- Student Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('student')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-sm border border-outline-variant hover:border-outline transition-colors ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-2xl bg-surface-container flex items-center justify-center text-on-surface-variant shrink-0 group-hover:bg-on-surface-variant group-hover:text-surface transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="person">person</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Student</h3>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your learning path, submit assignments, and collaborate with your supervisors.</p>
</div>
</div>
</div>
</button>
</div>
<!-- Footer / Visual Area -->
<div class="mt-auto pt-10 pb-6 w-full max-w-sm flex flex-col items-center">
<div class="relative w-full aspect-video rounded-3xl overflow-hidden shadow-sm bg-surface-container-low border border-outline-variant">
<img class="w-full h-full object-cover grayscale opacity-20" data-alt="Modern library interior with scholarly atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXO_TdJsMdFTjEBnejfRZmLEoWQu7l5n1nCwh0ShLrQ9-WwRRVCo4Itgd9HljBiIp7dbaSvEXw21tZlLQswx61YuuOxIvhgkAoiXq-fchcpIJXoeFKPayaJzT3lAb_vo9FFkS1I3Q7qXaOpHsaXFkiXoGUMtz92-rVG_E6XKou3COAdFUN_vEZ6eulJt3FSDDSKcS_gDheXSMym5gW1R9ffqvoTvOStagPs4R1NTNxNMZOXfdkUD-m1Hr9h53vM22K0nUfiVa2nSQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<p class="text-center font-label-md text-label-md text-outline mt-6">Version 2.4.0 • Secured by ScholarTrust</p>
</div>
</main>
<script>
        function selectRole(role) {
            console.log('Role selected:', role);
            const main = document.querySelector('main');
            main.style.opacity = '0.5';
            main.style.transition = 'opacity 0.2s ease';
            setTimeout(() => {
                alert(`Navigating to ${role} interface...`);
                main.style.opacity = '1';
            }, 300);
        }
    </script>
</body></html>
