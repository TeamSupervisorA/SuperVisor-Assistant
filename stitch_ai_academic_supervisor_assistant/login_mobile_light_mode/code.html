<style>
        .academic-depth {
            box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.05), 0px 2px 4px -2px rgba(0, 0, 0, 0.05);
        }
        .ai-border-accent {
            border-left: 2px solid #3525cd;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Top AppBar (Simplified for Login) -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant flex justify-center items-center h-16 px-margin_mobile z-40">
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-primary">ScholarTrack AI</h1>
</header>
<main class="flex-grow flex items-center justify-center px-margin_mobile py-10">
<div class="w-full max-w-md flex flex-col gap-8">
<!-- Hero Illustration/Visual -->
<div class="relative w-full aspect-[16/9] rounded-xl overflow-hidden academic-depth mb-4">
<img alt="Modern University Campus" class="w-full h-full object-cover" data-alt="A cinematic, low-angle shot of a grand university library with soaring classical columns and massive arched windows. The scene is bathed in a crisp, bright morning light that highlights a clean, professional aesthetic. Soft blue-gray shadows and warm sunlight create a focused, scholarly atmosphere. The visual style is high-end architectural photography, emphasizing authority, prestige, and modern academic progress." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZRtZAG2cVtgMyFYuQpdy5n8FukEGYMVz3jkcbPq4QmlHqtTQemasFyB5_f6AHa2X3gJRYU7wgqTlanqPb-9iBc_ObBJ7_ZZbyWUGrEmtxVhx8r3d9FFEP57Vv6g10fwcHil0a84PGTesoVrv72BZabqIYR2s2pEHmRF7V7cknDD1IlLa7rTsxZfiIoBIcm3iRq9SMl-QJ1wLDDG92Zx72aU_wJOA4VbsV0WE_3KXB8sgV7Fl86pwTjSgf25QxA2FfwIRSlC_FfKo"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent"></div>
</div>
<!-- Login Container -->
<div class="bg-surface-container-lowest rounded-[24px] p-8 academic-depth ai-border-accent flex flex-col gap-6">
<div class="space-y-2">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your academic supervision workspace.</p>
</div>
<form class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-secondary-fixed-variant" for="email">University Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-body-md text-body-md text-on-surface" id="email" name="email" placeholder="name@university.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-secondary-fixed-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-body-md text-body-md text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-3 rounded-lg academic-depth hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="flex flex-col items-center gap-4 border-t border-outline-variant pt-6">
<p class="font-body-sm text-body-sm text-on-surface-variant">No account yet?</p>
<button class="w-full border border-primary text-primary font-title-lg text-title-lg py-3 rounded-lg hover:bg-primary-container/10 active:scale-95 transition-all">
                        Request Access
                    </button>
</div>
</div>
<!-- Bottom Disclaimer -->
<footer class="flex flex-col items-center gap-4 text-center">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-md text-label-md">Secure Institutional Portal</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px]">
                    Authorized use only. By logging in, you agree to our academic integrity and data privacy policies.
                </p>
</footer>
</div>
</main>
<!-- Simple Feedback Animation -->
<script>
        document.querySelector('form').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('In a real application, this would authenticate against your university server.');
            }, 1500);
        });
    </script>
</body></html>
