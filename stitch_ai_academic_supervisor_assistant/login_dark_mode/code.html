<style>
        /* Ambient Academic Shadow */
        .shadow-academic {
            box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.2), 0px 2px 4px -2px rgba(0, 0, 0, 0.2);
        }

<body class="bg-background min-h-screen flex items-center justify-center relative font-body-md text-body-md text-on-background">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 bg-surface-container-low" data-alt="A sophisticated, out-of-focus background representing a modern, prestigious university library or research center. The scene is bathed in bright, soft, natural daylight, emphasizing a high-key, modern aesthetic. The color palette features cool tones of Soft Blue-Gray and Indigo, aligning with an advanced AI technology theme. The atmosphere is quiet, scholarly, and technologically advanced, perfect for a subtle backdrop." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBlhLbFOJlDFqs42oiANIn-P_mLCCNzS0A8ov0p_JL4AeKQKG63n7XPMZJnFiWNH1sS9HOd5nbKBWKiUx8w9YZzhn4_zyN34j_SDhU05NGwLcjAZ2UKqrcn0n8hG1r0FjE8e0VK2LjU8Xc7ErBfPOn7GWNyezniaE3-xIc94oRnwejHTOm27s6sTwlMeUtDJJIl-F3CibXFj5WoBbQpblycW8bi_4H99gQl0flPL9ZY8-PXwVjbdatb75ZjlJYz_rTRsDtTLwrU60Y'); background-size: cover; background-position: center;">
<div class="absolute inset-0 bg-surface-container-lowest/90 backdrop-blur-md"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px] px-margin_mobile md:px-0">
<!-- Main Card (AI Specific Styling) -->
<div class="bg-surface-container-lowest rounded-[24px] shadow-academic border-l-[2px] border-primary p-8 relative overflow-hidden border border-outline-variant/30">
<!-- AI Sparkle Icon -->
<span class="material-symbols-outlined absolute top-6 right-6 text-primary" style="font-variation-settings: 'FILL' 1;">
                auto_awesome
            </span>
<!-- Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high text-primary mb-4">
<span class="material-symbols-outlined text-[32px]">
                        school
                    </span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Academic AI</h1>
<p class="font-body-md text-body-md text-secondary">Supervision Suite Sign In</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">
                            mail
                        </span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline" id="email" name="email" placeholder="scholar@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">
                            lock
                        </span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-title-lg text-title-lg py-3 rounded-lg transition-colors duration-200 mt-2 flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[20px]">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-secondary">
                    New to the platform? 
                    <a class="text-primary font-bold hover:underline transition-all" href="#">Request access</a>
</p>
</div>
</div>
<!-- System Status/Trust Indicator -->
<div class="text-center mt-6">
<p class="font-label-md text-label-md text-secondary inline-flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-[#10B981]"></span>
                System Operational · Encrypted Connection
            </p>
</div>
</main>
</body></html>
