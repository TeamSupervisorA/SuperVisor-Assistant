<!DOCTYPE html>

<html lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ai-card-border {
            position: relative;
        }
        .ai-card-border::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, #4f46e5, #89ceff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant flex justify-between items-center h-16 px-margin_mobile z-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-primary">ScholarTrack AI</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</button>
</header>
<main class="flex-1 px-margin_mobile py-10 flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-10 space-y-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select your role to access your personalized academic dashboard.</p>
</div>
<!-- Role Selection Bento-ish Grid -->
<div class="w-full max-w-md space-y-6">
<!-- Admin Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('admin')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-[0px_4px_6px_-1px_rgba(0,0,0,0.05),0px_2px_4px_-2px_rgba(0,0,0,0.05)] border-l-4 border-primary ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-xl bg-primary-container/10 flex items-center justify-center text-primary shrink-0 group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Administrator</h3>
<span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Manage institutional settings, oversee faculty performance, and access high-level analytics.</p>
</div>
</div>
</div>
</button>
<!-- Teacher Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('teacher')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-[0px_4px_6px_-1px_rgba(0,0,0,0.05),0px_2px_4px_-2px_rgba(0,0,0,0.05)] border-l-4 border-tertiary ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-xl bg-tertiary-fixed/30 flex items-center justify-center text-tertiary shrink-0 group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="supervisor_account">supervisor_account</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Teacher</h3>
<span class="material-symbols-outlined text-tertiary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Supervise student research, provide feedback on tasks, and track academic milestones.</p>
</div>
</div>
</div>
</button>
<!-- Student Role -->
<button class="w-full text-left group transition-all duration-200 active:scale-[0.98]" onclick="selectRole('student')">
<div class="bg-surface-container-lowest rounded-[24px] p-6 shadow-[0px_4px_6px_-1px_rgba(0,0,0,0.05),0px_2px_4px_-2px_rgba(0,0,0,0.05)] border-l-4 border-outline ai-card-border">
<div class="flex items-start gap-4">
<div class="w-14 h-14 rounded-xl bg-surface-container flex items-center justify-center text-on-surface-variant shrink-0 group-hover:bg-on-surface-variant group-hover:text-surface transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="person">person</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<h3 class="font-title-lg text-title-lg text-on-surface">Student</h3>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your learning path, submit assignments, and collaborate with your supervisors.</p>
</div>
</div>
</div>
</button>
</div>
<!-- Footer / Illustration Area -->
<div class="mt-auto pt-10 pb-6 w-full max-w-sm">
<div class="relative w-full aspect-video rounded-3xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover grayscale opacity-20" data-alt="A sophisticated group of university students and professors collaborating in a modern glass-walled library. Soft, natural lighting filters through large windows, creating a bright and scholarly atmosphere. The scene is captured in a clean, high-key photography style with a focus on intellectual exchange and technological integration in a premium academic setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXO_TdJsMdFTjEBnejfRZmLEoWQu7l5n1nCwh0ShLrQ9-WwRRVCo4Itgd9HljBiIp7dbaSvEXw21tZlLQswx61YuuOxIvhgkAoiXq-fchcpIJXoeFKPayaJzT3lAb_vo9FFkS1I3Q7qXaOpHsaXFkiXoGUMtz92-rVG_E6XKou3COAdFUN_vEZ6eulJt3FSDDSKcS_gDheXSMym5gW1R9ffqvoTvOStagPs4R1NTNxNMZOXfdkUD-m1Hr9h53vM22K0nUfiVa2nSQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<p class="text-center font-label-md text-label-md text-outline mt-6">Version 2.4.0 • Secured by ScholarTrust</p>
</div>
</main>
<!-- Bottom Nav Bar (Suppressed because this is a focused transactional selection screen, however shown for system consistency as per instructions if needed, but the rule says suppress on transactional selection. I will follow the relevance check and suppress it to prioritize the content canvas.) -->
<script>
        function selectRole(role) {
            console.log('Role selected:', role);
            // Simulated navigation effect
            const body = document.querySelector('body');
            body.style.opacity = '0.5';
            body.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                // In a real app: window.location.href = `/${role}/dashboard`;
                alert(`Redirecting to ${role} interface...`);
                body.style.opacity = '1';
            }, 500);
        }

        // Add subtle hover effect for cards
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const icon = btn.querySelector('.material-symbols-outlined[data-icon="auto_awesome"], .material-symbols-outlined[data-icon="psychology"], .material-symbols-outlined[data-icon="auto_stories"]');
                if(icon) icon.style.transform = 'rotate(15deg) scale(1.1)';
            });
            btn.addEventListener('mouseleave', () => {
                const icon = btn.querySelector('.material-symbols-outlined[data-icon="auto_awesome"], .material-symbols-outlined[data-icon="psychology"], .material-symbols-outlined[data-icon="auto_stories"]');
                if(icon) icon.style.transform = 'rotate(0deg) scale(1)';
            });
        });
    </script>
</body></html>
